startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      includeShared:
        type: boolean
        default: false
        description: Include shared notes/folders in results
  commandFunction:
    |-
    (config) => ({
      command: 'npx',
      args: ['-y', 'airmcp'],
      env: config.includeShared ? { AIRMCP_INCLUDE_SHARED: 'true' } : {}
    })
