name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      npm_auth_mode:
        description: 'npm auth mode. Use trusted publishing by default; token mode is only for fallback.'
        required: true
        default: trusted-publishing
        type: choice
        options:
          - trusted-publishing
          - token

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  publish:
    needs: ci
    runs-on: macos-latest
    environment: npm
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-tags: true

      - name: Extract package info
        id: pkg
        run: |
          NAME=$(node -e "console.log(require('./package.json').name)")
          VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing $NAME@$VERSION"

      - name: Version guard
        run: |
          if git show-ref --tags --verify --quiet "refs/tags/v${{ steps.pkg.outputs.version }}"; then
            echo "::error::Tag v${{ steps.pkg.outputs.version }} already exists. Bump the version first."
            exit 1
          fi

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Select npm auth mode
        id: npm-auth
        env:
          NPM_AUTH_MODE: ${{ inputs.npm_auth_mode || 'trusted-publishing' }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          case "$NPM_AUTH_MODE" in
            trusted-publishing)
              echo "mode=trusted-publishing" >> "$GITHUB_OUTPUT"
              echo "::notice::Using npm trusted publishing. NPM_TOKEN is ignored even if the secret is set."
              ;;
            token)
              if [ -z "${NPM_TOKEN:-}" ]; then
                echo "::error::npm_auth_mode=token requires the NPM_TOKEN secret."
                exit 1
              fi
              echo "mode=token" >> "$GITHUB_OUTPUT"
              echo "::notice::Using NPM_TOKEN fallback for npm publish."
              ;;
            *)
              echo "::error::Unsupported npm_auth_mode: $NPM_AUTH_MODE"
              exit 1
              ;;
          esac

      - name: npm auth preflight
        if: steps.npm-auth.outputs.mode == 'token'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm whoami

      - name: Install dependencies
        run: npm ci

      - name: Release preflight
        run: npm run release:preflight

      - name: Publish root with provenance
        if: steps.npm-auth.outputs.mode == 'trusted-publishing'
        run: |
          if npm view "${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }}" version >/dev/null 2>&1; then
            echo "${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }} is already published; skipping root publish."
          else
            npm publish --provenance --access public
          fi

      - name: Publish root with provenance (token fallback)
        if: steps.npm-auth.outputs.mode == 'token'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if npm view "${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }}" version >/dev/null 2>&1; then
            echo "${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }} is already published; skipping root publish."
          else
            npm publish --provenance --access public
          fi

      - name: Publish add-ons with provenance
        if: steps.npm-auth.outputs.mode == 'trusted-publishing'
        run: |
          npm run addons:publish -- --publish --all --no-build --skip-verify

      - name: Publish add-ons with provenance (token fallback)
        if: steps.npm-auth.outputs.mode == 'token'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm run addons:publish -- --publish --all --no-build --skip-verify

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v2.5.0
        with:
          tag_name: v${{ steps.pkg.outputs.version }}
          name: v${{ steps.pkg.outputs.version }}
          generate_release_notes: true
          files: build/release-preflight/airmcp-${{ steps.pkg.outputs.version }}.mcpb
          fail_on_unmatched_files: true

      - name: Verify public release state
        env:
          GH_TOKEN: ${{ github.token }}
        run: npm run release:verify
