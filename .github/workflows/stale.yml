name: Stale Issues

on:
  schedule:
    - cron: "0 0 * * *"

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 30
          days-before-close: 7
          stale-issue-label: stale
          stale-pr-label: stale
          stale-issue-message: >
            This issue has been inactive for 30 days and will be closed in 7 days
            unless there is new activity. If this is still relevant, please comment
            to keep it open.
          stale-pr-message: >
            This PR has been inactive for 30 days and will be closed in 7 days
            unless there is new activity.
          exempt-issue-labels: "good first issue,help wanted,pinned,bug"
          exempt-pr-labels: "pinned,work in progress"
