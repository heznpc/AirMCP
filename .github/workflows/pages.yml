name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22

      # Build Starlight docs site
      - name: Install docs dependencies
        working-directory: docs/site
        run: npm ci

      - name: Build docs site
        working-directory: docs/site
        run: npm run build

      # Assemble: landing page at root, Starlight at /docs/
      - name: Assemble pages
        run: |
          mkdir -p _site
          # Copy landing page + assets (everything except site/ directory)
          rsync -a --exclude='site/' --exclude='testing.md' docs/ _site/
          # Copy Starlight build to /docs/ subpath
          cp -r docs/site/dist/ _site/docs/

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
