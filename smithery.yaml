name: airmcp
description: Approval-gated local action runtime for Apple workspaces — 295 tools across 29 modules, profile-based loading, progressive tool exposure, HITL approval, audit logs, and Mac app automation.
homepage: https://github.com/heznpc/AirMCP
icon: https://raw.githubusercontent.com/heznpc/AirMCP/main/icons/airmcp-icon-256.png
license: MIT
startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      includeShared:
        type: boolean
        default: false
        description: Include shared notes/folders in results
  commandFunction:
    |-
    (config) => ({
      command: 'npx',
      args: ['-y', 'airmcp'],
      env: config.includeShared ? { AIRMCP_INCLUDE_SHARED: 'true' } : {}
    })
