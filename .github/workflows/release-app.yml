name: Release AirMCP.app (signed + notarized)

# Runs only by explicit dispatch after cd.yml has created the immutable GitHub
# Release. Produces a Developer-ID-signed,
# notarized, stapled AirMCP.app and AirMCPWidget.appex for Gatekeeper-
# clean distribution outside the App Store.
#
# Required GitHub secrets (store them in the `release` environment only after
# its reviewer, no-admin-bypass, and tag-only rules pass the source gate):
#   APPLE_DEVELOPER_ID          Common name of the Developer ID
#                               Application certificate, e.g.
#                               "Developer ID Application: Heznpc (TEAMID)"
#   APPLE_ID                    Apple ID email for notarytool
#   APPLE_ID_PASSWORD           App-specific password — generate at
#                               appleid.apple.com → Sign-in and security
#   APPLE_TEAM_ID               10-character team identifier
#   APPLE_CERT_P12_BASE64       Developer ID Application cert + private
#                               key exported as .p12, base64-encoded
#                               (base64 -i cert.p12 | pbcopy)
#   APPLE_CERT_P12_PASSWORD     Password for the .p12 import
#
# Until all six secrets are set, the release job exits early with a clear
# message. Source code also fails closed if GitHub reports that environment
# review/tag protection is absent.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v2.11.0)"
        required: true
      require_signing:
        description: "Fail instead of skipping when Apple signing secrets are missing"
        required: false
        type: boolean
        default: false

concurrency:
  group: release-app-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve-release:
    runs-on: macos-latest
    permissions:
      actions: read
      contents: read
    outputs:
      sha: ${{ steps.identity.outputs.sha }}
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Resolve and validate release tag
        id: release
        env:
          REQUESTED_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          if [[ ! "$REQUESTED_TAG" =~ ^v?(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "::error::Release tag must be v?MAJOR.MINOR.PATCH with no leading zeroes"
            exit 1
          fi
          VERSION="${REQUESTED_TAG#v}"
          TAG="v$VERSION"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved immutable release tag: $TAG"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: refs/tags/${{ steps.release.outputs.tag }}
          fetch-depth: 0

      - name: Verify release environment protection
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: node scripts/verify-release-environment.mjs --repo="${{ github.repository }}" --tag="$RELEASE_TAG"

      # This runs even when Apple signing secrets are absent, so an external
      # tag push with a mismatched package/app/widget version fails instead of
      # being reported as a harmless signing skip.
      - name: Verify immutable release source identity
        id: identity
        env:
          EXPECTED_VERSION: ${{ steps.release.outputs.version }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG_SHA="$(git rev-parse "refs/tags/$RELEASE_TAG^{commit}")"
          HEAD_SHA="$(git rev-parse HEAD)"
          if [ "$TAG_SHA" != "$HEAD_SHA" ]; then
            echo "::error::Checked-out HEAD $HEAD_SHA does not match $RELEASE_TAG commit $TAG_SHA"
            exit 1
          fi
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$HEAD_SHA" origin/main; then
            echo "::error::Release tag is not reachable from origin/main"
            exit 1
          fi
          RELEASE_TARGET="$(gh api "repos/${{ github.repository }}/releases/tags/$RELEASE_TAG" --jq .target_commitish)"
          if [ "$RELEASE_TARGET" != "$HEAD_SHA" ]; then
            echo "::error::GitHub Release target does not match the immutable tag commit"
            exit 1
          fi
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [ "$PACKAGE_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "::error::$RELEASE_TAG requests $EXPECTED_VERSION but package.json is $PACKAGE_VERSION"
            exit 1
          fi
          BUNDLE_SOURCE_VERSION="$(sed -nE 's/.*CFBundleShortVersionString string ([0-9]+\.[0-9]+\.[0-9]+).*/\1/p' scripts/bundle-app.sh)"
          WIDGET_SOURCE_VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' app/widget/Info.plist)"
          if [ "$BUNDLE_SOURCE_VERSION" != "$EXPECTED_VERSION" ] || [ "$WIDGET_SOURCE_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "::error::Source bundle versions must match $EXPECTED_VERSION (app=$BUNDLE_SOURCE_VERSION widget=$WIDGET_SOURCE_VERSION)"
            exit 1
          fi
          echo "sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "Release source verified: $RELEASE_TAG -> $HEAD_SHA -> package/app/widget $EXPECTED_VERSION"

  release-app:
    needs: resolve-release
    runs-on: macos-latest
    environment: release
    permissions:
      actions: read
      contents: write
      id-token: write # Sigstore signing for attest-build-provenance
      attestations: write # Upload attestation to the repo's attestation store
    env:
      # Signed distribution includes the widget. Local `release:preflight
      # -- --app` keeps its faster widget-skipping default unless this flag is
      # explicitly set by the signed lane.
      AIRMCP_REQUIRE_WIDGET: "1"
    steps:
      # Re-query immediately after the environment gate too. This closes the
      # interval between source resolution and approval without reading any
      # Apple secret in the check itself.
      - name: Re-verify release environment protection
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.resolve-release.outputs.tag }}
        run: node scripts/verify-release-environment.mjs --repo="${{ github.repository }}" --tag="$RELEASE_TAG"

      # Missing signing secrets are not an npm/.mcpb release blocker. This
      # check runs only after the API-verified `release` environment gate.
      - name: Preflight — required secrets present
        id: signing
        env:
          REQUIRE_SIGNING: ${{ inputs.require_signing || false }}
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_P12_PASSWORD: ${{ secrets.APPLE_CERT_P12_PASSWORD }}
        run: |
          missing=()
          [ -n "$APPLE_DEVELOPER_ID" ]      || missing+=("APPLE_DEVELOPER_ID")
          [ -n "$APPLE_ID" ]                || missing+=("APPLE_ID")
          [ -n "$APPLE_ID_PASSWORD" ]       || missing+=("APPLE_ID_PASSWORD")
          [ -n "$APPLE_TEAM_ID" ]           || missing+=("APPLE_TEAM_ID")
          [ -n "$APPLE_CERT_P12_BASE64" ]   || missing+=("APPLE_CERT_P12_BASE64")
          [ -n "$APPLE_CERT_P12_PASSWORD" ] || missing+=("APPLE_CERT_P12_PASSWORD")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            if [ "$REQUIRE_SIGNING" = "true" ]; then
              echo "::error::Missing required secrets: ${missing[*]}"
              echo "See .github/workflows/release-app.yml header for the full list"
              exit 1
            fi
            echo "::notice::Skipping signed app release; missing secrets: ${missing[*]}"
            echo "See .github/workflows/release-app.yml header for the full list"
            exit 0
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: steps.signing.outputs.ready == 'true'
        with:
          ref: refs/tags/${{ needs.resolve-release.outputs.tag }}
          fetch-depth: 0

      - name: Verify protected release checkout
        if: steps.signing.outputs.ready == 'true'
        env:
          EXPECTED_SHA: ${{ needs.resolve-release.outputs.sha }}
          EXPECTED_VERSION: ${{ needs.resolve-release.outputs.version }}
          RELEASE_TAG: ${{ needs.resolve-release.outputs.tag }}
        run: |
          TAG_SHA="$(git rev-parse "refs/tags/$RELEASE_TAG^{commit}")"
          HEAD_SHA="$(git rev-parse HEAD)"
          if [ "$TAG_SHA" != "$EXPECTED_SHA" ] || [ "$HEAD_SHA" != "$EXPECTED_SHA" ]; then
            echo "::error::Release tag moved or checkout drifted (expected=$EXPECTED_SHA tag=$TAG_SHA HEAD=$HEAD_SHA)"
            exit 1
          fi
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [ "$PACKAGE_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "::error::$RELEASE_TAG requests $EXPECTED_VERSION but package.json is $PACKAGE_VERSION"
            exit 1
          fi
          echo "Protected release checkout verified: $RELEASE_TAG -> $HEAD_SHA -> package $EXPECTED_VERSION"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        if: steps.signing.outputs.ready == 'true'
        with:
          node-version: 22
          cache: "npm"

      - name: Select Xcode
        if: steps.signing.outputs.ready == 'true'
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install dependencies
        if: steps.signing.outputs.ready == 'true'
        run: npm ci

      # Run every dry artifact check plus the real governed MCP workflow before
      # importing signing material or producing a notarization submission.
      # Failure is intentionally blocking: no signed app can bypass this gate.
      - name: Release preflight (governed app gate)
        if: steps.signing.outputs.ready == 'true'
        run: npm run release:preflight -- --app

      - name: Build .app bundle (ad-hoc signed baseline)
        if: steps.signing.outputs.ready == 'true'
        run: bash scripts/bundle-app.sh

      - name: Verify release bundle identity
        if: steps.signing.outputs.ready == 'true'
        env:
          EXPECTED_VERSION: ${{ needs.resolve-release.outputs.version }}
        run: |
          APP_VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' AirMCP.app/Contents/Info.plist)"
          WIDGET_PLIST="AirMCP.app/Contents/PlugIns/AirMCPWidget.appex/Contents/Info.plist"
          if [ ! -f "$WIDGET_PLIST" ]; then
            echo "::error::Signed release requires AirMCPWidget.appex"
            exit 1
          fi
          WIDGET_VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$WIDGET_PLIST")"
          if [ "$APP_VERSION" != "$EXPECTED_VERSION" ] || [ "$WIDGET_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "::error::Built app/widget versions must match $EXPECTED_VERSION (app=$APP_VERSION widget=$WIDGET_VERSION)"
            exit 1
          fi

      # Import the Developer ID certificate into a throwaway keychain only
      # after governed acceptance and the exact ad-hoc bundle identity pass.
      # The keychain is discarded with the ephemeral runner.
      - name: Import signing certificate
        if: steps.signing.outputs.ready == 'true'
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_P12_PASSWORD: ${{ secrets.APPLE_CERT_P12_PASSWORD }}
        run: |
          umask 077
          KEYCHAIN=build.keychain
          KEYCHAIN_PW="$(uuidgen)"
          if ! security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null 2>&1 ||
             ! security default-keychain -s "$KEYCHAIN" >/dev/null 2>&1 ||
             ! security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null 2>&1 ||
             ! security set-keychain-settings -t 3600 -u "$KEYCHAIN" >/dev/null 2>&1; then
            echo "::error::Ephemeral signing keychain setup failed"
            exit 1
          fi

          trap 'rm -f cert.p12' EXIT
          if ! printf '%s' "$APPLE_CERT_P12_BASE64" | base64 --decode > cert.p12 2>/dev/null; then
            echo "::error::Signing certificate decoding failed"
            exit 1
          fi
          if ! security import cert.p12 -k "$KEYCHAIN" \
            -P "$APPLE_CERT_P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security >/dev/null 2>&1; then
            rm -f cert.p12
            echo "::error::Signing certificate import failed"
            exit 1
          fi
          rm -f cert.p12

          # Let codesign run non-interactively against this keychain.
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null 2>&1 || {
              echo "::error::Signing key access setup failed"
              exit 1
            }

      - name: Verify public signing identity
        if: steps.signing.outputs.ready == 'true'
        env:
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          AIRMCP_SIGNING_KEYCHAIN: build.keychain
        run: bash scripts/verify-signing-identity.sh

      - name: Sign + notarize + staple
        if: steps.signing.outputs.ready == 'true'
        env:
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          AIRMCP_SIGNING_KEYCHAIN: build.keychain
        run: bash scripts/notarize-app.sh

      - name: Package signed .app for release
        if: steps.signing.outputs.ready == 'true'
        env:
          VERSION: ${{ needs.resolve-release.outputs.version }}
        run: |
          ditto -c -k --keepParent AirMCP.app "AirMCP-${VERSION}.zip"
          ls -la "AirMCP-${VERSION}.zip"

      # SLSA build provenance for the notarized .app archive. The `.mcpb`
      # Desktop Extension is built and attached by cd.yml alongside the npm
      # publish, because it needs no Apple signing secrets and should not be
      # blocked on notarization.
      - name: Generate artifact attestation
        if: steps.signing.outputs.ready == 'true'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: AirMCP-${{ needs.resolve-release.outputs.version }}.zip

      - name: Attach artifacts to Release
        if: steps.signing.outputs.ready == 'true'
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v2
        with:
          tag_name: ${{ needs.resolve-release.outputs.tag }}
          files: AirMCP-${{ needs.resolve-release.outputs.version }}.zip
          fail_on_unmatched_files: true
          generate_release_notes: true
