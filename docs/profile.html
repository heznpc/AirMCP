<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>heznpc — Developer Profile</title>
  <meta name="description" content="heznpc — Building tools that connect AI to your Mac.">
  <meta name="theme-color" content="#0e1117">
  <link rel="icon" type="image/x-icon" href="airmcp-icon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="airmcp-icon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="airmcp-icon-16.png">
  <link rel="apple-touch-icon" sizes="256x256" href="airmcp-icon-256.png">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['-apple-system','BlinkMacSystemFont','Helvetica Neue','Helvetica','Arial','sans-serif'],
            mono: ['JetBrains Mono','ui-monospace','monospace'],
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Profile-specific styles */
    .avatar{
      width:120px;height:120px;border-radius:50%;
      border:3px solid rgba(255,255,255,.12);
      box-shadow:0 8px 32px rgba(0,0,0,.2),0 0 0 1px rgba(255,255,255,.06);
      transition:transform .4s cubic-bezier(.2,.8,.2,1),box-shadow .4s;
    }
    .avatar:hover{transform:scale(1.05);box-shadow:0 12px 40px rgba(0,0,0,.3),0 0 0 1px rgba(255,255,255,.1)}
    [data-theme="light"] .avatar{
      border-color:rgba(255,255,255,.5);
      box-shadow:0 8px 32px rgba(0,0,0,.08),0 0 0 1px rgba(255,255,255,.6);
    }
    [data-theme="light"] .avatar:hover{
      box-shadow:0 12px 40px rgba(0,0,0,.12),0 0 0 1px rgba(255,255,255,.7);
    }
    .profile-name{
      background:linear-gradient(180deg,#fff 30%,rgba(255,255,255,.45));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    }
    [data-theme="light"] .profile-name{
      background:linear-gradient(180deg,#1d1d1f 30%,rgba(29,29,31,.45));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    }
    .project-icon{
      width:56px;height:56px;border-radius:14px;
      box-shadow:0 4px 12px rgba(0,0,0,.15);
    }
    [data-theme="light"] .project-icon{
      box-shadow:0 4px 12px rgba(0,0,0,.06);
    }
    .link-icon{
      width:20px;height:20px;opacity:.5;flex-shrink:0;
    }
    .glass-card{cursor:default}
    .glass-card.clickable{cursor:pointer}
  </style>
</head>
<body class="font-sans antialiased overflow-x-hidden leading-relaxed">

  <!-- Ambient orbs -->
  <div class="scene" aria-hidden="true">
    <div class="orb orb-a"></div>
    <div class="orb orb-b"></div>
    <div class="orb orb-c"></div>
  </div>

  <!-- Nav -->
  <nav class="glass-nav">
    <div class="max-w-[1080px] mx-auto px-5 flex items-center justify-between h-full">
      <a href="index.html" class="flex items-center gap-2 font-mono text-sm font-medium opacity-80 tracking-tight">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 12L6 8l4-4"/></svg>
        <img src="airmcp-icon-32.png" alt="" width="24" height="24">AirMCP
      </a>
      <div class="flex items-center gap-6">
        <a href="https://github.com/heznpc" target="_blank" rel="noopener" class="text-sm opacity-45 font-medium hover:opacity-90 transition-opacity">GitHub</a>
        <button class="pill-btn" id="themeToggle" aria-label="Toggle theme">
          <span class="theme-icon" id="themeIcon"></span>
        </button>
      </div>
    </div>
  </nav>

  <!-- Hero / Profile -->
  <header class="relative z-[1] pt-[calc(56px+80px)] pb-16 text-center">
    <div class="max-w-[1080px] mx-auto px-5">
      <div class="flex flex-col items-center gap-5 reveal">
        <img src="https://github.com/heznpc.png" alt="heznpc" class="avatar" width="120" height="120">
        <h1 class="text-[clamp(2.4rem,7vw,4.5rem)] font-bold leading-[.98] tracking-tighter profile-name">heznpc</h1>
      </div>
      <p class="mt-4 text-lg opacity-45 font-medium reveal" data-delay="60">Building tools that connect AI to your Mac</p>
    </div>
  </header>

  <!-- Projects -->
  <section class="relative z-[1] py-10 pb-20">
    <div class="max-w-[640px] mx-auto px-5">
      <p class="section-label mb-6 reveal">Projects</p>
      <a href="index.html" class="block">
        <div class="glass-card clickable reveal" data-delay="40">
          <div class="glass-fx"></div><div class="glass-tint"></div><div class="glass-shine"></div>
          <div class="glass-content">
            <div class="flex items-start gap-4">
              <img src="airmcp-icon-128.png" alt="AirMCP" class="project-icon" width="56" height="56">
              <div class="flex-1 min-w-0">
                <h3 class="card-title text-lg">AirMCP</h3>
                <p class="card-desc mt-1">Connect AI to your entire Apple ecosystem. Open-source MCP server with native macOS integration.</p>
                <div class="flex gap-3 mt-4">
                  <div class="glass-stat" style="border-radius:10px">
                    <div class="glass-fx"></div>
                    <div class="glass-tint"></div>
                    <div class="glass-content text-center py-2 px-4" style="padding:8px 16px">
                      <div class="text-base font-bold tracking-tight">252</div>
                      <div class="text-[.65rem] opacity-35">Tools</div>
                    </div>
                  </div>
                  <div class="glass-stat" style="border-radius:10px">
                    <div class="glass-fx"></div>
                    <div class="glass-tint"></div>
                    <div class="glass-content text-center py-2 px-4" style="padding:8px 16px">
                      <div class="text-base font-bold tracking-tight">25</div>
                      <div class="text-[.65rem] opacity-35">Modules</div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </a>
    </div>
  </section>

  <!-- Links -->
  <section class="relative z-[1] py-10 pb-24">
    <div class="max-w-[640px] mx-auto px-5">
      <p class="section-label mb-6 reveal">Links</p>
      <div class="flex flex-col gap-3">
        <a href="https://github.com/heznpc" target="_blank" rel="noopener">
          <div class="glass-card clickable reveal" data-delay="40">
            <div class="glass-fx"></div><div class="glass-tint"></div><div class="glass-shine"></div>
            <div class="glass-content" style="padding:20px 28px">
              <div class="flex items-center gap-4">
                <svg class="link-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
                <div class="flex-1 min-w-0">
                  <div class="text-sm font-semibold">GitHub</div>
                  <div class="text-xs opacity-35 font-mono">github.com/heznpc</div>
                </div>
                <svg class="link-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;opacity:.3"><path d="M6 4l4 4-4 4"/></svg>
              </div>
            </div>
          </div>
        </a>
        <a href="https://www.npmjs.com/package/airmcp" target="_blank" rel="noopener">
          <div class="glass-card clickable reveal" data-delay="80">
            <div class="glass-fx"></div><div class="glass-tint"></div><div class="glass-shine"></div>
            <div class="glass-content" style="padding:20px 28px">
              <div class="flex items-center gap-4">
                <svg class="link-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M0 7.334v8h6.666v1.332H12v-1.332h12v-8H0zm6.666 6.664H5.334v-4H3.999v4H1.335V8.667h5.331v5.331zm4 0h-2.666V8.667h2.666v5.331zm12 0h-1.33v-4h-1.337v4h-1.332v-4h-1.336v4h-2.669V8.667h8.004v5.331zM10 10h1.334v2.667H10V10z"/></svg>
                <div class="flex-1 min-w-0">
                  <div class="text-sm font-semibold">npm</div>
                  <div class="text-xs opacity-35 font-mono">npmjs.com/package/airmcp</div>
                </div>
                <svg class="link-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;opacity:.3"><path d="M6 4l4 4-4 4"/></svg>
              </div>
            </div>
          </div>
        </a>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="relative z-[1] py-6 border-t border-white/[.04]">
    <div class="max-w-[1080px] mx-auto px-5 flex flex-col items-center gap-2 text-center">
      <span class="flex items-center gap-2 font-mono text-sm font-medium opacity-60"><img src="airmcp-icon-32.png" alt="" width="20" height="20">AirMCP</span>
      <p class="text-[.7rem] opacity-15">MIT License</p>
    </div>
  </footer>

  <script>
    // Theme toggle
    (function(){
      var root=document.documentElement;
      var toggle=document.getElementById('themeToggle');
      var icon=document.getElementById('themeIcon');
      function update(){icon.textContent=root.dataset.theme==='dark'?'\u2600':'\u263E';}
      update();
      toggle.addEventListener('click',function(){
        root.dataset.theme=root.dataset.theme==='dark'?'light':'dark';
        try{localStorage.setItem('airmcp-theme',root.dataset.theme);}catch(e){}
        update();
      });
      try{
        var saved=localStorage.getItem('airmcp-theme');
        if(saved){root.dataset.theme=saved;update();}
      }catch(e){}
    })();

    // Scroll reveal
    (function(){
      var els=document.querySelectorAll('.reveal');
      var obs=new IntersectionObserver(function(entries){
        entries.forEach(function(e){
          if(e.isIntersecting){
            var d=parseInt(e.target.dataset.delay||0);
            setTimeout(function(){e.target.classList.add('visible');},d);
            obs.unobserve(e.target);
          }
        });
      },{threshold:0.1});
      els.forEach(function(el){obs.observe(el);});
    })();
  </script>
</body>
</html>
