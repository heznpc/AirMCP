name: CI

on:
  push:
    branches: [main]
  # Trigger on every PR regardless of base branch so stacked PRs
  # (PR targeting another PR's branch — common with chained RFC work)
  # get full CI feedback before the chain merges sequentially to main.
  # Without this, only the stack's bottom PR shows checks, and later
  # regressions only surface after each rebase onto main.
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  ci:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for large files
        run: |
          LARGE=$(find . -not -path './.git/*' -not -path './node_modules/*' -type f -size +5M)
          if [ -n "$LARGE" ]; then
            echo "::error::Large files detected (>5 MB):"
            echo "$LARGE"
            exit 1
          fi

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Review route plan (RFC 0013/0014 — stratified review)
        if: github.event_name == 'pull_request'
        env:
          # Pass the base ref through env (not interpolated into the run string)
          # per the workflow-injection guidance — no shell metachar interpretation.
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          git fetch origin "$BASE_REF" --depth=1 2>/dev/null || true
          node scripts/review-route.mjs --base "origin/$BASE_REF" --check
        # Informational: prints the tier plan + per-area failure modes to hunt +
        # any T0 file changed without its guard test. Not a blocker (no --strict)
        # — its job is to make review depth match blast radius on every PR.

      - name: Cache tsbuildinfo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v4
        with:
          path: dist/.tsbuildinfo
          key: tsbuildinfo-${{ hashFiles('src/**/*.ts', 'tsconfig.json') }}
          restore-keys: tsbuildinfo-

      - name: Check licenses
        run: npx license-checker --failOn "GPL-2.0;GPL-3.0;AGPL-3.0"

      - name: Security audit
        run: npm audit --audit-level=high

      # RFC 0003 Phase 1 — non-fatal advisory: surface moderate+ findings
      # in CI logs so reviewers can prioritise upgrades before we ratchet
      # the hard gate down to `moderate` in Phase 2. Exit code is always 0.
      - name: Security audit advisory (moderate+)
        run: node scripts/summarize-audit.mjs
        continue-on-error: true

      - name: Verify npm signatures
        run: npm audit signatures

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Smoke — boot server + tools/list round-trip
        run: npm run smoke

      # Drives a pinned @modelcontextprotocol/inspector --cli against the
      # built dist/index.js (scripts/mcp-validate.mjs). Catches JSON-RPC
      # envelope drift, embedded error envelopes, and zero-tool responses
      # before plugin submission to anthropics/claude-plugins-community.
      # Wrapper captures stdout AND stderr and parses the response — exit
      # code alone is not the contract. timeout-minutes bounds a teardown
      # bug at 2 min instead of GitHub's default 6 h.
      - name: MCP Inspector validate
        timeout-minutes: 2
        run: npm run mcp:validate

      - name: Profile exposure matrix
        run: npm run profiles:check

      - name: Task harness adapter wire matrix
        run: npm run harness:check

      - name: Verify add-on package boundaries
        run: npm run addons:check

      - name: Verify public source and npm package size
        run: npm run size:check

      - name: Verify installed add-on package smoke
        timeout-minutes: 10
        run: npm run addons:verify-install -- --all

      # Forcing function on the SHIPPED artifact (RFC 0014 root-cause). The
      # step above boots the repo's dist/; this packs the real tarball,
      # installs it into a CLEAN project (deps resolved fresh, no repo on
      # PATH), and boots THAT under the inspector — the only gate that tests
      # what `npx -y airmcp` actually delivers. Catches incomplete `files`,
      # missing dist modules (the banner.js npx crash), and a dist that
      # builds in-repo but breaks once isolated. Asserts the default starter
      # surface boots with the core JXA tools present.
      - name: Verify published package boots (shipped-artifact gate)
        timeout-minutes: 5
        run: npm run verify:package

      - name: Verify tool manifest (RFC 0007 A.0)
        run: |
          npm run gen:manifest
          echo "--- diff (should be empty) ---"
          git --no-pager diff --stat docs/tool-manifest.json || true
          git --no-pager diff docs/tool-manifest.json | head -200 || true
          git diff --exit-code docs/tool-manifest.json

      - name: Verify manifest schema contract
        run: node scripts/verify-tool-manifest.mjs

      - name: Verify MCPB extension manifest (Claude Desktop bundle)
        run: npm run build:mcpb:check

      - name: Verify generated Swift intents (RFC 0007 A.1)
        run: |
          npm run gen:intents
          echo "--- diff (should be empty) ---"
          git --no-pager diff --stat swift/Sources/AirMCPKit/Generated/MCPIntents.swift || true
          git --no-pager diff swift/Sources/AirMCPKit/Generated/MCPIntents.swift | head -200 || true
          git diff --exit-code swift/Sources/AirMCPKit/Generated/MCPIntents.swift

      - name: Verify golden-sample intents (RFC 0007 §3.6)
        run: node scripts/verify-golden-intents.mjs

      - name: Verify stats
        run: node scripts/count-stats.mjs --check

      - name: Verify llms.txt + llms-full.txt drift
        run: npm run llms:check

      - name: Verify tool description token budget
        run: npm run tokens:check

      - name: Verify version sync
        run: node scripts/sync-version.mjs --check

      - name: Verify i18n
        run: node scripts/check-i18n.mjs

      # Swift builds require Xcode toolchain (not CommandLineTools)
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Cache Swift build artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            swift/.build
            ios/.build
          key: swift-${{ runner.os }}-${{ hashFiles('swift/Package.resolved', 'ios/Package.resolved') }}
          restore-keys: |
            swift-${{ runner.os }}-

      - name: Swift — Build AirMCPKit
        run: cd swift && swift build

      - name: Swift — Test AirMCPKit
        run: cd swift && swift test

      - name: Swift — Build AirMCPServer (iOS)
        run: cd ios && swift build

      - name: Swift — Test AirMCPServer
        run: cd ios && swift test
