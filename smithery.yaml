name: airmcp
description: Governed MCP runtime for the Apple ecosystem, available on macOS for Notes, Mail, Calendar, Reminders, Shortcuts, and more.
homepage: https://github.com/heznpc/AirMCP
icon: https://raw.githubusercontent.com/heznpc/AirMCP/main/icons/airmcp-icon-256.png
license: MIT
startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      includeShared:
        type: boolean
        default: false
        description: Include shared notes/folders in results
  commandFunction:
    |-
    (config) => ({
      command: 'npx',
      args: ['-y', 'airmcp'],
      env: config.includeShared ? { AIRMCP_INCLUDE_SHARED: 'true' } : {}
    })
